name: publish

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: "go.mod"

            - name: Release and publish
              uses: goreleaser/goreleaser-action@v7
              with:
                  args: release --clean
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
