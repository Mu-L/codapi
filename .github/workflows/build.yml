name: build

on:
    push:
        branches: [main]
        paths-ignore:
            - "docs/**"
            - Makefile
            - README.md
    pull_request:
        branches: [main]
        paths-ignore:
            - "docs/**"
            - Makefile
            - README.md
    workflow_dispatch:

defaults:
    run:
        shell: bash

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: "go.mod"

            - name: Install linter
              uses: golangci/golangci-lint-action@v9

            - name: Test and build
              run: make vet lint test build

            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: codapi
                  path: build/codapi
                  retention-days: 7
